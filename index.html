<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tic-Tac-Toe vs AI Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="info-panel">
        <div id="turn-display">Your Turn (Red)</div>
        <div id="status-display">Click a sphere. Drag to rotate grid.</div>
    </div>

    <div id="controls-panel">
        <select id="difficulty-select" onchange="setDifficulty(this.value)">
            <option value="easy">🟢 Easy</option>
            <option value="medium">🟡 Medium</option>
            <option value="hard" selected>🔴 Hard</option>
        </select>
        <button id="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="script.js"></script>
</body>
</html>
